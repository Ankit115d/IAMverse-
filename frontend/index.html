<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IAMverse Platform</title>

    <!-- Content Security Policy: allow backend + Google OAuth -->
<meta
  http-equiv="Content-Security-Policy"
  content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com;
    style-src  'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://accounts.google.com;
    style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://accounts.google.com;
    font-src   'self' https://fonts.gstatic.com https://unpkg.com https://cdn.jsdelivr.net;
    img-src    'self' data: https://accounts.google.com;
    connect-src 'self' https://iamverse-backend-g0fo.onrender.com https://accounts.google.com https://apis.google.com https://unpkg.com https://cdn.jsdelivr.net;
    frame-src https://accounts.google.com;
    child-src https://accounts.google.com;
  "
/>

    <!-- Anti-clickjacking -->
    <!-- <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" /> -->

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts (with crossorigin) -->
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Audiowide&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <!-- Tabler Icons (without SRI to avoid hash mismatch) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
